<!DOCTYPE html>
</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-bg: #121212; --card-bg: #1e1e1e; --accent: #f1f33f; --blue: #3498db; }
        body { background-color: var(--main-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); text-decoration: none; }
        .btn-add-top { background: #333; color: white; padding: 5px 15px; border-radius: 8px; text-decoration: none; border: 1px solid var(--accent); font-size: 14px; cursor: pointer; }

        .filter-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .filter-list { margin-top: 10px; }
        .filter-item {
            background: var(--card-bg); margin-bottom: 12px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer;
        }
        .filter-label { display: flex; align-items: center; gap: 15px; }
        .filter-text p { margin: 0; font-size: 16px; font-weight: 500; }
        .filter-text span { font-size: 13px; color: #888; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 20px; border-radius: 20px; width: 85%; max-width: 450px; position: relative; max-height: 80vh; overflow-y: auto; }
        .close-modal { color: var(--accent); font-size: 30px; cursor: pointer; float: left; }
        .option-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        .car-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
        .btn-results { position: fixed; bottom: 20px; left: 5%; width: 90%; background: var(--accent); color: black; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 18px; cursor: pointer; border: none; z-index: 1000; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .form-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="logo">SalmiCars</div>
        <div class="btn-add-top" onclick="openModal('addCarModal')">+ ضع إعلاناً</div>
    </header>

    <div id="searchView">
        <div class="filter-header">
            <span style="color: #888;">إلغاء</span>
            <span style="font-weight: bold;">فلترة البحث</span>
            <i class="fa fa-trash-can"></i>
        </div>

        <div class="filter-list">
            <div class="filter-item" onclick="openModal('brandModal')">
                <div class="filter-label"><i class="fa fa-car"></i><div class="filter-text"><p>الماركة</p><span id="txtBrand">الكل</span></div></div>
                <i class="fa fa-chevron-left"></i>
            </div>
            <div class="filter-item" onclick="openModal('cityModal')">
                <div class="filter-label"><i class="fa fa-location-dot" style="color:var(--blue)"></i><div class="filter-text"><p>المدينة</p><span id="txtCity">المغرب (الكل)</span></div></div>
                <i class="fa fa-chevron-left"></i>
            </div>
            <div class="filter-item" onclick="openModal('priceModal')">
                <div class="filter-label"><i class="fa fa-money-bill"></i><div class="filter-text"><p>الميزانية</p><span id="txtPrice">بدون تحديد</span></div></div>
                <i class="fa fa-chevron-left"></i>
            </div>
        </div>
        <button class="btn-results" onclick="showResults()">عرض النتائج</button>
    </div>

    <div id="resultsPage" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="resultCountHeader">النتائج المتاحة</h2>
            <button onclick="backToFilter()" style="background: none; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 5px;">تعديل البحث</button>
        </div>
        <div id="carList"></div>
    </div>

    <div id="brandModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('brandModal')">&times;</span><h3>اختر الماركة</h3><div id="brandOptions"></div></div></div>
    <div id="cityModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('cityModal')">&times;</span><h3>المدينة</h3><div id="cityOptions"></div></div></div>
    <div id="priceModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('priceModal')">&times;</span><h3>الميزانية</h3><input type="range" min="10000" max="1000000" step="5000" id="priceRange" oninput="updatePriceLabel(this.value)"><p id="priceLabel" style="text-align:center; color:var(--accent); font-size:20px;">500,000 DH</p><button class="btn-results" style="position:static; width:100%" onclick="confirmPrice()">تأكيد</button></div></div>

    <div id="addCarModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('addCarModal')">&times;</span>
            <h3 style="text-align: center;">إضافة إعلان جديد</h3>
            <input type="text" id="inBrand" class="form-input" placeholder="الماركة (مثلاً: Dacia)">
            <input type="text" id="inModel" class="form-input" placeholder="الموديل (مثلاً: Logan)">
            <input type="number" id="inPrice" class="form-input" placeholder="الثمن (درهم)">
            <select id="inCity" class="form-input">
                <option>الدار البيضاء</option><option>الرباط</option><option>طنجة</option><option>مراكش</option>
            </select>
            <input type="text" id="inImg" class="form-input" placeholder="رابط الصورة (URL)">
            <button onclick="addNewCar()" style="width:100%; background:var(--accent); color:black; padding:15px; border-radius:10px; border:none; font-weight:bold; cursor:pointer; margin-top:10px;">نشر الإعلان الآن 🚀</button>
        </div>
    </div>

    <script>
        // 1. جلب البيانات من LocalStorage أو استخدام الافتراضية
        let carsData = JSON.parse(localStorage.getItem('salmiCars')) || [
            { id: 1, brand: 'Dacia', model: 'Logan', price: 85000, city: 'الدار البيضاء', year: 2019, fuel: 'Diesel', km: 95000, img: 'https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?w=400' },
            { id: 2, brand: 'Volkswagen', model: 'Golf 7', price: 160000, city: 'طنجة', year: 2018, fuel: 'Diesel', km: 120000, img: 'https://images.unsplash.com/photo-1542281286-9e0a16bb7366?w=400' }
        ];

        const carBrands = ['Dacia', 'Renault', 'Volkswagen', 'Peugeot', 'Mercedes-Benz', 'BMW'];
        const moroccanCities = ['الدار البيضاء', 'الرباط', 'طنجة', 'مراكش', 'أكادير', 'فاس'];

        window.onload = function() {
            renderOptions();
        };

        function renderOptions() {
            const bDiv = document.getElementById('brandOptions');
            bDiv.innerHTML = carBrands.map(b => `<div class="option-item" onclick="selectOption('txtBrand', '${b}', 'brandModal')">${b}</div>`).join('');
            
            const cDiv = document.getElementById('cityOptions');
            cDiv.innerHTML = moroccanCities.map(c => `<div class="option-item" onclick="selectOption('txtCity', '${c}', 'cityModal')">${c}</div>`).join('');
        }

        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        function selectOption(id, val, modal) {
            document.getElementById(id).innerText = val;
            closeModal(modal);
        }

        function updatePriceLabel(val) { 
            document.getElementById('priceLabel').innerText = parseInt(val).toLocaleString() + " DH"; 
        }

        function confirmPrice() { 
            document.getElementById('txtPrice').innerText = "أقل من " + document.getElementById('priceLabel').innerText;
            closeModal('priceModal'); 
        }

        function showResults() {
            const brand = document.getElementById('txtBrand').innerText;
            const city = document.getElementById('txtCity').innerText;
            const price = parseInt(document.getElementById('priceRange').value);

            const filtered = carsData.filter(car => {
                const matchBrand = (brand === 'الكل' || car.brand === brand);
                const matchCity = (city === 'المغرب (الكل)' || car.city === city);
                const matchPrice = (car.price <= price);
                return matchBrand && matchCity && matchPrice;
            });

            renderCarCards(filtered);
            document.getElementById('searchView').style.display = "none";
            document.getElementById('mainHeader').style.display = "none";
            document.getElementById('resultsPage').style.display = "block";
        }

        function renderCarCards(cars) {
            const container = document.getElementById('carList');
            container.innerHTML = '';
            document.getElementById('resultCountHeader').innerText = `النتائج (${cars.length})`;
            
            if (cars.length === 0) { 
                container.innerHTML = '<p style="text-align:center; padding:50px;">لا توجد نتائج تطابق بحثك.</p>'; 
                return; 
            }

            cars.forEach(car => {
                container.innerHTML += `
                    <div class="car-card">
                        <img src="${car.img}" style="width:100%; height:200px; object-fit:cover;">
                        <div style="padding:15px;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h3 style="margin:0;">${car.brand} ${car.model}</h3>
                                <span style="color:var(--accent); font-weight:bold;">${car.price.toLocaleString()} DH</span>
                            </div>
                            <p style="color:#888; font-size:14px; margin:10px 0;">${car.city} | ${car.year} | ${car.km || 0} كلم</p>
                            <a href="https://wa.me/212600000000" style="display:block; background:#25d366; color:white; text-align:center; padding:12px; border-radius:8px; text-decoration:none; font-weight:bold;">واتساب</a>
                        </div>
                    </div>`;
            });
        }

        function addNewCar() {
            const b = document.getElementById('inBrand').value;
            const m = document.getElementById('inModel').value;
            const p = parseInt(document.getElementById('inPrice').value);
            const c = document.getElementById('inCity').value;
            const i = document.getElementById('inImg').value || 'https://via.placeholder.com/400x200?text=Salmi+Cars';

            if(!b || !m || !p) { alert("املاً جميع الخانات الأساسية!"); return; }

            const newCar = { id: Date.now(), brand: b, model: m, price: p, city: c, year: 2024, km: 0, img: i };
            carsData.unshift(newCar);
            
            saveToLocal(); // حفظ البيانات الجديدة في الذاكرة
            
            alert("تم إضافة إعلانك بنجاح!");
            closeModal('addCarModal');
            location.reload(); // إعادة تحميل للتأكد من تحديث البيانات
        }

        function saveToLocal() {
            localStorage.setItem('salmiCars', JSON.stringify(carsData));
        }

        function backToFilter() {
            document.getElementById('searchView').style.display = "block";
            document.getElementById('mainHeader').style.display = "flex";
            document.getElementById('resultsPage').style.display = "none";
        }
    </script>
</body>
</html>
